<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8636B"/>
      <stop offset="100%" stop-color="#D4A05A"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8636B"/>
      <stop offset="100%" stop-color="#D4A05A"/>
    </linearGradient>
  </defs>

  <!-- Icon Mark (centered, upper portion) -->
  <g transform="translate(300, 200)">
    <!-- Gradient rounded square background -->
    <rect x="-110" y="-110" width="220" height="220" rx="44" ry="44" fill="url(#brandGradient)"/>

    <!-- Main celebration sparkle -->
    <path d="M0,-68 C10,-27 27,-10 68,0 C27,10 10,27 0,68 C-10,27 -27,10 -68,0 C-27,-10 -10,-27 0,-68Z"
          fill="white" opacity="0.95" transform="translate(0,-8)"/>

    <!-- Inner rotated sparkle -->
    <path d="M0,-40 C5,-16 16,-5 40,0 C16,5 5,16 0,40 C-5,16 -16,5 -40,0 C-16,-5 -5,-16 0,-40Z"
          fill="white" opacity="0.3" transform="translate(0,-8) rotate(45)"/>

    <!-- Small sparkles -->
    <g transform="translate(78,-60)">
      <path d="M0,-11 C2,-4.5 4.5,-2 11,0 C4.5,2 2,4.5 0,11 C-2,4.5 -4.5,2 -11,0 C-4.5,-2 -2,-4.5 0,-11Z"
            fill="white" opacity="0.8"/>
    </g>
    <g transform="translate(-72,-48)">
      <path d="M0,-8 C1.5,-3 3,-1.5 8,0 C3,1.5 1.5,3 0,8 C-1.5,3 -3,1.5 -8,0 C-3,-1.5 -1.5,-3 0,-8Z"
            fill="white" opacity="0.6"/>
    </g>
    <g transform="translate(82,48)">
      <path d="M0,-9 C1.5,-3.5 3.5,-1.5 9,0 C3.5,1.5 1.5,3.5 0,9 C-1.5,3.5 -3.5,1.5 -9,0 C-3.5,-1.5 -1.5,-3.5 0,-9Z"
            fill="white" opacity="0.7"/>
    </g>

    <!-- Dot accents -->
    <circle cx="92" cy="0" r="3.5" fill="white" opacity="0.5"/>
    <circle cx="-88" cy="20" r="2.8" fill="white" opacity="0.4"/>

    <!-- Decorative arc (Ha letter hint) -->
    <path d="M-38,72 Q0,94 38,72" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <circle cx="26" cy="84" r="3.2" fill="white" opacity="0.7"/>
  </g>

  <!-- Arabic text: حفلتي -->
  <text x="300" y="390" text-anchor="middle"
        font-family="'Readex Pro', 'Noto Sans Arabic', Arial, sans-serif"
        font-weight="700" font-size="72" fill="url(#textGradient)"
        direction="rtl" unicode-bidi="bidi-override">حفلتي</text>

  <!-- English text: Haflati -->
  <text x="300" y="440" text-anchor="middle"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600" font-size="32" fill="#16213E"
        letter-spacing="3">HAFLATI</text>

  <!-- Tagline -->
  <text x="300" y="475" text-anchor="middle"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="14" fill="#6B7280"
        letter-spacing="4">EVENT PLANNING MARKETPLACE</text>
</svg>
